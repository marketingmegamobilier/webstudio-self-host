services:
  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    # Dokploy: puertos internos solo (expose), no se publican en el host.
    # - 9000: S3 API → lo consume `app` vía S3_ENDPOINT (http://minio:9000).
    # - 9001: MinIO Console → crea un dominio en Dokploy apuntando al puerto 9001
    #         si necesitas acceder a la consola desde fuera.
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - webstudio-build-net

  # ── MinIO bucket init (runs once) ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-webstudio-assets}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
        mc mb --ignore-existing local/$$S3_BUCKET
        mc anonymous set download local/$$S3_BUCKET
        echo 'Bucket ready.'
    networks:
      - default
      - webstudio-build-net

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webstudio
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - webstudio-build-net

  # ── PostgREST ───────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_DB_SCHEMAS: public
    networks:
      - default
      - webstudio-build-net

  # ── PostgREST permissions (runs once after DB is ready) ─────────────────────
  # Grants the "anon" role access to all existing tables so PostgREST can query
  # them. The init SQL already sets DEFAULT PRIVILEGES for future tables; this
  # service handles any tables that existed before the grant was applied.
  db-setup:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql "postgresql://postgres:$$POSTGRES_PASSWORD@db:5432/webstudio" \
          -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon NOLOGIN; END IF; END \$\$;" \
          -c "GRANT USAGE ON SCHEMA public TO anon;" \
          -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO anon;" \
          -c "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO anon;" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO anon;" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO anon;"
    networks:
      - default
      - webstudio-build-net

  # ── Schema migrations ───────────────────────────────────────────────────────
  migrate:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-community/builder:latest}
    restart: "no"
    depends_on:
      db-setup:
        condition: service_completed_successfully
    entrypoint:
      - /prisma/node_modules/.bin/prisma
      - migrate
      - deploy
      - --schema=/app/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
    networks:
      - default
      - webstudio-build-net

  # ── Self-hosted publisher ────────────────────────────────────────────────────
  # Port 4000 (internal): build API — receives publish requests from the builder.
  # Port 4001: site proxy — serves all published sites. En Dokploy NO se mapea al
  #   host 80; se enruta vía dominio de Dokploy hacia este puerto (ver expose).
  #   SSR domains → reverse-proxied to their react-router-serve subprocess
  #   SSG domains → static files served directly from /var/publish/<domain>/
  publisher:
    image: ${PUBLISHER_IMAGE:-ghcr.io/webstudio-community/webstudio-publisher:latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # Dokploy: el host 80/443 ya lo gestiona el Traefik de Dokploy, así que NO
    # publicamos puertos. Exponemos solo el 4001 (site proxy) para que Dokploy
    # enrute hacia aquí. IMPORTANTE:
    #   - Crea en Dokploy un dominio (ej. tu dominio de publicación) apuntando
    #     al puerto 4001 de este servicio.
    #   - Para los sitios publicados con dominios propios (SSR/SSG) necesitarás
    #     un dominio wildcard (*.tu-dominio) también apuntando a 4001, ya que el
    #     publisher despacha por Host todos los sitios publicados.
    expose:
      - "4001"
    environment:
      TRPC_SERVER_API_TOKEN: ${TRPC_SERVER_API_TOKEN}
      PUBLISHER_HOST: ${PUBLISHER_HOST:-}
      BUILDER_INTERNAL_URL: http://app:3000
      PROXY_PORT: "4001"
      # Dokploy/SSR: red donde el publisher conecta los contenedores de build de
      # SSR para que alcancen el build API (publisher:4000) y al builder (app:3000).
      # Debe coincidir con el 'name:' de la red definida abajo.
      DOCKER_NETWORK: webstudio-build-net
      # Optional: set to your Traefik file-provider directory to enable auto-generation
      # of per-domain route configs for custom domains (with TLS via Let's Encrypt).
      # Example: TRAEFIK_DYNAMIC_DIR=/etc/traefik/dynamic
      # Also add a bind mount below: - ${TRAEFIK_DYNAMIC_DIR}:${TRAEFIK_DYNAMIC_DIR}:rw
      TRAEFIK_DYNAMIC_DIR: ${TRAEFIK_DYNAMIC_DIR:-}
    volumes:
      - published-sites:/var/publish
      - publisher-work:/var/work
      # Dokploy/SSR: el publisher levanta contenedores de build; necesita acceso
      # al daemon de Docker del host. Sin esto, buildMode 'ssr' no funciona.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    # En la 'default' (comunicación normal con app/db/minio) + 'webstudio-net'
    # (nombre fijo para que los contenedores de build SSR alcancen este servicio).
    networks:
      - default
      - webstudio-build-net

  # ── Webstudio builder ───────────────────────────────────────────────────────
  app:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-community/builder:latest}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGREST_URL: http://postgrest:3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      AUTH_SECRET: ${AUTH_SECRET}
      DEV_LOGIN: ${DEV_LOGIN:-}
      DEV_LOGIN_EMAIL: ${DEV_LOGIN_EMAIL:-}
      GH_CLIENT_ID: ${GH_CLIENT_ID:-}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DEPLOYMENT_ENVIRONMENT: production
      DEPLOYMENT_URL: ${DEPLOYMENT_URL:-}
      AUTH_WS_CLIENT_ID: ${AUTH_WS_CLIENT_ID:-self-hosted}
      AUTH_WS_CLIENT_SECRET: ${AUTH_WS_CLIENT_SECRET}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PUBLISHER_HOST: ${PUBLISHER_HOST:-wstd.work}
      FEATURES: ${FEATURES:-*}
      USER_PLAN: ${USER_PLAN:-Pro}
      MAX_ASSETS_PER_PROJECT: ${MAX_ASSETS_PER_PROJECT:-50}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-webstudio-assets}
      ENTRI_APPLICATION_ID: ${ENTRI_APPLICATION_ID:-webstudio}
      ENTRI_SECRET: ${ENTRI_SECRET:-}
      TRPC_SERVER_API_TOKEN: ${TRPC_SERVER_API_TOKEN:-}
      SELF_HOSTED_PUBLISHER_URL: ${SELF_HOSTED_PUBLISHER_URL:-http://publisher:4000}
    volumes:
      - uploads:/app/public/s/uploads
    # En la 'default' (comunicación con db/postgrest/minio) + 'webstudio-net'
    # (para que los contenedores de build SSR creados por el publisher lo alcancen).
    networks:
      - default
      - webstudio-build-net

networks:
  # En Dokploy la red 'default' implícita NO resuelve nombres entre servicios
  # (por eso postgrest/app no encontraban 'db' → error 500 "Invariant failed").
  # Solución: TODOS los servicios se conectan ADEMÁS a 'webstudio-build-net'
  # (red explícita con nombre fijo), que SÍ proporciona DNS. Mantenemos 'default'
  # por compatibilidad con el enrutamiento de Dokploy.
  # DOCKER_NETWORK apunta aquí para que los contenedores de build SSR alcancen
  # también a db/postgrest/publisher/app.
  webstudio-build-net:
    name: webstudio-build-net

volumes:
  db-data:
  uploads:
  minio-data:
  published-sites:
  publisher-work: